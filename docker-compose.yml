services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: ict-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ictlab
      POSTGRES_USER: ictlab
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ict-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ictlab"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Express 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ict-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ictlab:${DB_PASSWORD}@postgres:5432/ictlab?schema=public
      DIRECT_URL: postgresql://ictlab:${DB_PASSWORD}@postgres:5432/ictlab?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads
    networks:
      - ict-net

  # React 前端（Nginx 静态文件服务）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: ict-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - ict-net

volumes:
  pgdata:
  uploads:

networks:
  ict-net:
    driver: bridge
